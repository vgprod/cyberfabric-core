# Cypilot SDLC Kit — Subagent Definitions
#
# Declares agents that the `cypilot agents` command generates as
# tool-specific proxy files (Claude Code, Cursor, Copilot, OpenAI Codex).
#
# Semantic fields (mode, isolation, model) are mapped to per-tool
# frontmatter by the agents command — kits never need tool-specific knowledge.
#
# Field mappings by tool:
#
#   isolation (bool):
#     Claude Code  → true = worktree-isolated agent, false = main-context agent
#     Cursor       → true = "agent" mode (background), false = inline composer
#     Copilot      → true = separate workspace context, false = shared context
#     Codex        → true = sandboxed execution, false = shared session
#
#   model (string):
#     "inherit"    → all tools: use the model selected by the user/session
#     "fast"       → Claude Code: maps to "sonnet"; Cursor: kept as "fast";
#                    Copilot/Codex: maps to the tool's fast-tier model
#     Prefer "inherit" unless the agent explicitly needs a cheaper/faster tier.
#     Use "fast" only for high-volume, low-complexity tasks (e.g. PR review).

[agents.cypilot-codegen]
description = """\
Cypilot code generator. Use when requirements are fully specified and \
no clarification is needed. Takes a complete task description and \
implements it in an isolated context \u2014 no back-and-forth, just code."""
prompt_file = "agents/cypilot-codegen.md"
mode = "readwrite"
isolation = true
model = "inherit"

[agents.cypilot-pr-review]
description = """\
Cypilot PR reviewer. Use to review pull requests with structured \
checklist-based analysis. Runs in a separate context so detailed \
review output stays isolated from the main conversation."""
prompt_file = "agents/cypilot-pr-review.md"
mode = "readonly"
isolation = false
model = "fast"

[agents.cypilot-ralphex]
description = """\
Cypilot ralphex delegation agent. Use when delegating a Cypilot plan \
to ralphex for autonomous execution. Manages discovery, export, \
delegation, and handoff lifecycle."""
prompt_file = "agents/cypilot-ralphex.md"
mode = "readwrite"
isolation = false
model = "inherit"

[agents.cypilot-phase-runner]
description = """\
Cypilot execution-plan phase runner. Use when executing the next or a \
specific phase from a generated Cypilot plan inside a dedicated agent \
context, without delegating to ralphex."""
prompt_file = "agents/cypilot-phase-runner.md"
mode = "readwrite"
isolation = true
model = "inherit"

[agents.cypilot-phase-compiler]
description = """\
Cypilot execution-plan phase compiler. Use when compiling exactly one \
plan phase from its brief in an isolated agent context, without \
delegating to ralphex or executing the phase."""
prompt_file = "agents/cypilot-phase-compiler.md"
mode = "readwrite"
isolation = true
model = "inherit"
