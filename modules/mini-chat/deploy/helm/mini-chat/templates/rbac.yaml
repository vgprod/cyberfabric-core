{{- if .Values.leaderElection.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "mini-chat.serviceAccountName" . }}
  labels:
    {{- include "mini-chat.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "mini-chat.fullname" . }}-lease
  labels:
    {{- include "mini-chat.labels" . | nindent 4 }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "mini-chat.fullname" . }}-lease
  labels:
    {{- include "mini-chat.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "mini-chat.fullname" . }}-lease
subjects:
  - kind: ServiceAccount
    name: {{ include "mini-chat.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
