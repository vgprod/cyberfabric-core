# ── Components ─────────────────────────────────────────────────────

components:

  parameters:
    GroupId:
      name: group_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      example: 22222222-2222-2222-2222-222222222222

    TypeSchemaId:
      name: schema_id
      in: path
      required: true
      description: "GTS type path (`$id` value without `gts://` prefix)."
      schema:
        type: string
      example: "gts.x.core.rg.type.v1~y.core.tn.tenant.v1~"

    MembershipGroupId:
      name: group_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      example: 33333333-3333-3333-3333-333333333333

    MembershipResourceType:
      name: resource_type
      in: path
      required: true
      description: "GTS type identifier of the resource (ends with `~`)."
      schema:
        type: string
      example: "gts.z.core.idp.user.v1~"

    MembershipResourceId:
      name: resource_id
      in: path
      required: true
      schema:
        type: string
      example: R4

    DeleteForce:
      name: force
      in: query
      required: false
      schema:
        type: boolean
        default: false

    Limit:
      name: limit
      in: query
      required: false
      description: Number of items per page.
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 25

    Cursor:
      name: cursor
      in: query
      required: false
      description: |
        Opaque cursor token from a previous response (`next_cursor` or `prev_cursor`).
        Changing `$filter` with an existing cursor returns `400 FILTER_MISMATCH`.
      schema:
        type: string

    ODataFilter:
      name: $filter
      in: query
      required: false
      description: OData v4.01 filter expression.
      schema:
        type: string

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            detail: Requested entity does not exist
            status: 404
            title: Resource not found
            trace_id: 01HXYZRGNOTFOUND
            type: https://api.example.com/errors/not-found

  schemas:

    # ── Types ──

    GtsSchema:
      type: object
      description: |
        Raw GTS JSON Schema document. The server stores the schema as-is and extracts metadata:
        - `$id` → GTS type path (used as lookup key)
        - `x-gts-traits-schema` → trait shape (on base contracts)
        - `x-gts-traits` → trait values like `can_be_root`, `allowed_parents`, `allowed_memberships` (on chained types)
        - `allOf` + `$ref` → type inheritance chain
        For chained RG types, extracted traits are stored in junction tables for DB-enforced referential integrity.
      additionalProperties: true

    GtsSchemaPage:
      type: object
      required: [items, page_info]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/GtsSchema'
        page_info:
          $ref: '#/components/schemas/PageInfo'

    # ── Groups ──

    Group:
      type: object
      description: |
        Group entity. Base fields: `id`, `type`, `name`, `parent_id`, `tenant_id`.
        Derived type fields (e.g. `category`, `barrier`) are nested inside a `metadata` object.
        DB stores derived fields in `metadata` JSONB column.
      required: [id, type, name, parent_id, tenant_id]
      properties:
        id:
          type: string
          format: uuid
          example: 22222222-2222-2222-2222-222222222222
        type:
          type: string
          description: "GTS type identifier (chained type path, ends with `~`)."
          example: "gts.x.core.rg.type.v1~w.core.org.department.v1~"
        name:
          type: string
          example: D2
        parent_id:
          type: [string, 'null']
          format: uuid
          description: "Direct parent group (null for root groups)."
          example: 11111111-1111-1111-1111-111111111111
        tenant_id:
          type: string
          format: uuid
          readOnly: true
          description: "Computed by server. Derived from hierarchy — equals own id for tenant types, inherited from nearest tenant ancestor otherwise."
          example: 11111111-1111-1111-1111-111111111111
        metadata:
          type: object
          description: "Type-specific fields defined by the chained RG type schema. Schema varies per type."

    GroupPage:
      type: object
      required: [items, page_info]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Group'
        page_info:
          $ref: '#/components/schemas/PageInfo'

    GroupHierarchyItem:
      description: "Group with relative `depth` from reference group. Returned only by the hierarchy endpoint."
      allOf:
        - $ref: '#/components/schemas/Group'
        - type: object
          required: [depth]
          properties:
            depth:
              type: integer
              readOnly: true
              description: "Relative depth from reference group (0 = self, positive = descendants, negative = ancestors)."
              example: 1

    GroupHierarchyPage:
      type: object
      required: [items, page_info]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/GroupHierarchyItem'
        page_info:
          $ref: '#/components/schemas/PageInfo'

    CreateGroupRequest:
      type: object
      description: "Derived type fields (e.g. `category`) are sent inside the `metadata` object."
      required: [type, name]
      properties:
        id:
          type: string
          format: uuid
          description: "Optional. If omitted, server generates a UUID."
        type:
          type: string
          description: "GTS type identifier (chained type path, ends with `~`)."
          example: "gts.x.core.rg.type.v1~w.core.org.department.v1~"
        name:
          type: string
          example: D2
        parent_id:
          type: [string, 'null']
          format: uuid
          description: "Parent group ID."
          example: 11111111-1111-1111-1111-111111111111
        metadata:
          type: object
          description: "Type-specific fields defined by the chained RG type schema."

    UpdateGroupRequest:
      type: object
      required: [type, name]
      properties:
        type:
          type: string
          example: "gts.x.core.rg.type.v1~w.core.org.department.v1~"
        name:
          type: string
          example: D2
        parent_id:
          type: [string, 'null']
          format: uuid
          example: 11111111-1111-1111-1111-111111111111
      additionalProperties: true

    # ── Memberships ──

    Membership:
      type: object
      required: [group_id, resource_id, resource_type]
      properties:
        group_id:
          type: string
          format: uuid
          example: 33333333-3333-3333-3333-333333333333
        resource_id:
          type: string
          example: R4
        resource_type:
          type: string
          example: "gts.z.core.idp.user.v1~"

    MembershipPage:
      type: object
      required: [items, page_info]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Membership'
        page_info:
          $ref: '#/components/schemas/PageInfo'

    # ── Common ──

    Problem:
      type: object
      properties:
        type: { type: string }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        trace_id: { type: string }

    PageInfo:
      type: object
      required: [limit]
      properties:
        next_cursor:
          type: string
          description: Opaque token for next page. Omitted on last page.
        prev_cursor:
          type: string
          description: Opaque token for previous page. Omitted on first page.
        limit:
          type: integer
          format: int64
