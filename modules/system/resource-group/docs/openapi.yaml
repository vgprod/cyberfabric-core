# Created: 2026-03-06 by Constructor Tech
# Updated: 2026-04-07 by Constructor Tech

openapi: 3.1.0
info:
  title: Resource Group API
  version: 1.0.0
  description: |
    Resource Group API — generic hierarchy and membership engine.

    ## Types API

    The `/types` endpoint is a **GTS schema store**. You POST raw GTS JSON Schema documents
    and the server stores them as-is. The server extracts type metadata from the schema structure:
    - `$id` → GTS type path (becomes the `schema_id` for lookups)
    - `x-gts-traits-schema` → trait shape definition (on base contracts)
    - `x-gts-traits` → concrete trait values like `can_be_root`, `allowed_parents`, `allowed_memberships`
    - `allOf` + `$ref` → type inheritance chain

    For chained RG types, the server stores extracted traits in junction tables
    for DB-enforced referential integrity.

    **Registration order**: base types first (entity types, resource types, base contract),
    then chained types (that reference base types via `$ref`).

    ## Groups & Memberships API

    Supports cursor-based pagination and OData-style `$filter`.

    Type codes and resource types are GTS type paths.
    Format: `gts.<vendor>.<package>.<namespace>.<type>.v<MAJOR>[.<MINOR>]~`

    Example hierarchy:
    ```text
      tenant T1 (depth 0)
      ├── department D2 (depth 1) {metadata: {category: "finance", short_description: "Mega Department"}}
      │   └── branch B3 (depth 2) {metadata: {location: "Building A, Floor 3"}}
      └── tenant T7 (depth 1) {metadata: {barrier: true}}
      tenant T9 (depth 0) {metadata: {custom_domain: "t9.example.com"}}
    ```
servers:
  - url: https://api.example.com
tags:
  - name: types
    description: |
      GTS schema store. Accepts and returns raw GTS JSON Schema documents.
      The server extracts type-level metadata from `x-gts-traits` for internal use.
  - name: groups
    description: |
      Resource groups organized in a hierarchy.
      Every group has `parent_id`, `tenant_id`, and `depth` at the top level.
  - name: memberships
    description: Resource memberships bind resources to groups.

paths:

  # ── Types ──────────────────────────────────────────────────────────

  /api/types-registry/v1/types:
    get:
      operationId: listTypes
      tags: [types]
      summary: List registered GTS schemas
      description: |
        Returns paginated GTS JSON Schema documents.

        - `$filter`: `schema_id` (eq, ne, in) — matches against the `$id` field (without `gts://` prefix)
        - `limit`: page size (1..200), default 25
        - `cursor`: opaque token for pagination
      x-odata-filter:
        supported_fields:
          schema_id: [eq, ne, in]
      parameters:
        - $ref: '#/components/parameters/ODataFilter'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Paginated list of GTS schemas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GtsSchemaPage'
              examples:
                chained-types:
                  summary: Chained RG types
                  value:
                    items:
                      - $id: "gts://gts.x.core.rg.type.v1~y.core.tn.tenant.v1~"
                        $schema: "http://json-schema.org/draft-07/schema#"
                        allOf:
                          - { $ref: "gts://gts.x.core.rg.type.v1~" }
                          - properties:
                              metadata:
                                type: object
                                additionalProperties: false
                                properties:
                                  custom_domain: { type: string, format: hostname }
                                  barrier: { type: boolean, default: false }
                            x-gts-traits:
                              can_be_root: true
                              allowed_parents: ["gts.x.core.rg.type.v1~y.core.tn.tenant.v1~"]
                              allowed_memberships: ["gts.z.core.idp.user.v1~"]
                      - $id: "gts://gts.x.core.rg.type.v1~w.core.org.department.v1~"
                        $schema: "http://json-schema.org/draft-07/schema#"
                        allOf:
                          - { $ref: "gts://gts.x.core.rg.type.v1~" }
                          - properties:
                              metadata:
                                type: object
                                additionalProperties: false
                                properties:
                                  category: { type: string, maxLength: 100 }
                                  short_description: { type: string, maxLength: 500 }
                            x-gts-traits:
                              can_be_root: false
                              allowed_parents: ["gts.x.core.rg.type.v1~y.core.tn.tenant.v1~"]
                              allowed_memberships: ["gts.z.core.idp.user.v1~"]
                      - $id: "gts://gts.x.core.rg.type.v1~x.core.rg.branch.v1~"
                        $schema: "http://json-schema.org/draft-07/schema#"
                        allOf:
                          - { $ref: "gts://gts.x.core.rg.type.v1~" }
                          - properties:
                              metadata:
                                type: object
                                additionalProperties: false
                                properties:
                                  location: { type: string }
                            x-gts-traits:
                              can_be_root: false
                              allowed_parents: ["gts.x.core.rg.type.v1~w.core.org.department.v1~"]
                              allowed_memberships: ["gts.z.core.idp.user.v1~", "gts.z.core.lms.course.v1~"]
                    page_info:
                      next_cursor: "eyJpZCI6Ijc3NzcuLi4ifQ"
                      limit: 25

    post:
      operationId: createType
      tags: [types]
      summary: Register a GTS schema
      description: |
        Accepts a raw GTS JSON Schema document. The `$id` field determines the GTS type path.

        **Registration order**: base types first, then chained types.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GtsSchema'
            examples:

              # ── Step 1: Base contract ──

              rg-base-contract:
                summary: "Step 1a: RG base contract (x-gts-traits-schema)"
                value:
                  $id: "gts://gts.x.core.rg.type.v1~"
                  $schema: "http://json-schema.org/draft-07/schema#"
                  title: "Resource Group Type"
                  type: object
                  x-gts-traits-schema:
                    type: object
                    additionalProperties: false
                    properties:
                      can_be_root:
                        type: boolean
                        description: "Whether this type permits root placement."
                        default: false
                      allowed_parents:
                        type: array
                        items: { type: string, x-gts-ref: "gts.x.core.rg.type.v1~" }
                        description: "Well-known instances of allowed parent RG types."
                        default: []
                      allowed_memberships:
                        type: array
                        items: { type: string, x-gts-ref: "gts.*" }
                        description: "Resource types allowed as members."
                        default: []
                  x-gts-traits:
                    can_be_root: false
                    allowed_parents: []
                    allowed_memberships: []
                  required: [id, name]
                  properties:
                    id: { type: string, format: uuid }
                    name: { type: string, minLength: 1, maxLength: 255 }
                    parent_id: { type: [string, "null"], format: uuid }
                    tenant_id: { type: string, format: uuid, readOnly: true }
                    depth: { type: integer, readOnly: true }
                    metadata: { type: object, description: "Type-specific fields. Schema overridden by each chained RG type via allOf." }
                  x-gts-constraints:
                    placement-invariant: "can_be_root OR len(allowed_parents) >= 1"

              # ── Step 2: Entity types ──

              tenant-entity:
                summary: "Step 2a: Tenant entity type"
                value:
                  $id: "gts://gts.y.core.tn.tenant.v1~"
                  $schema: "http://json-schema.org/draft-07/schema#"
                  title: Tenant
                  type: object
                  required: [id, name]
                  properties:
                    id: { type: string, format: uuid }
                    name: { type: string, minLength: 1, maxLength: 255 }
                    custom_domain: { type: string, format: hostname }
                    barrier: { type: boolean, default: false }

              department-entity:
                summary: "Step 2b: Department entity type"
                value:
                  $id: "gts://gts.w.core.org.department.v1~"
                  $schema: "http://json-schema.org/draft-07/schema#"
                  title: Department
                  type: object
                  required: [id]
                  properties:
                    id: { type: string, format: uuid }
                    short_description: { type: string, maxLength: 500 }
                    category: { type: string, maxLength: 100 }

              branch-entity:
                summary: "Step 2c: Branch entity type"
                value:
                  $id: "gts://gts.x.core.rg.branch.v1~"
                  $schema: "http://json-schema.org/draft-07/schema#"
                  title: Branch
                  type: object
                  required: [id, name]
                  properties:
                    id: { type: string, format: uuid }
                    name: { type: string, minLength: 1, maxLength: 255 }
                    location: { type: string }

              user-resource:
                summary: "Step 2d: User resource type"
                value:
                  $id: "gts://gts.z.core.idp.user.v1~"
                  $schema: "http://json-schema.org/draft-07/schema#"
                  title: User
                  type: object
                  required: [id, email, display_name]
                  properties:
                    id: { type: string, format: uuid }
                    email: { type: string, format: email }
                    display_name: { type: string, minLength: 1, maxLength: 255 }
                    avatar_url: { type: string, format: uri }

              course-resource:
                summary: "Step 2e: Course resource type"
                value:
                  $id: "gts://gts.z.core.lms.course.v1~"
                  $schema: "http://json-schema.org/draft-07/schema#"
                  title: Course
                  type: object
                  required: [id, title]
                  properties:
                    id: { type: string, format: uuid }
                    title: { type: string, minLength: 1, maxLength: 255 }

              # ── Step 3: Chained RG types (base types must exist) ──

              tenant-rg-type:
                summary: "Step 3a: Tenant as RG type (chained, x-gts-traits)"
                value:
                  $id: "gts://gts.x.core.rg.type.v1~y.core.tn.tenant.v1~"
                  $schema: "http://json-schema.org/draft-07/schema#"
                  allOf:
                    - { $ref: "gts://gts.x.core.rg.type.v1~" }
                    - properties:
                        metadata:
                          type: object
                          additionalProperties: false
                          properties:
                            custom_domain: { type: string, format: hostname }
                            barrier: { type: boolean, default: false }
                      x-gts-traits:
                        can_be_root: true
                        allowed_parents: ["gts.x.core.rg.type.v1~y.core.tn.tenant.v1~"]
                        allowed_memberships: ["gts.z.core.idp.user.v1~"]

              department-rg-type:
                summary: "Step 3b: Department as RG type (chained, x-gts-traits)"
                value:
                  $id: "gts://gts.x.core.rg.type.v1~w.core.org.department.v1~"
                  $schema: "http://json-schema.org/draft-07/schema#"
                  allOf:
                    - { $ref: "gts://gts.x.core.rg.type.v1~" }
                    - properties:
                        metadata:
                          type: object
                          additionalProperties: false
                          properties:
                            category: { type: string, maxLength: 100 }
                            short_description: { type: string, maxLength: 500 }
                      x-gts-traits:
                        can_be_root: false
                        allowed_parents: ["gts.x.core.rg.type.v1~y.core.tn.tenant.v1~"]
                        allowed_memberships: ["gts.z.core.idp.user.v1~"]

              branch-rg-type:
                summary: "Step 3c: Branch as RG type (chained, x-gts-traits)"
                value:
                  $id: "gts://gts.x.core.rg.type.v1~x.core.rg.branch.v1~"
                  $schema: "http://json-schema.org/draft-07/schema#"
                  allOf:
                    - { $ref: "gts://gts.x.core.rg.type.v1~" }
                    - properties:
                        metadata:
                          type: object
                          additionalProperties: false
                          properties:
                            location: { type: string }
                      x-gts-traits:
                        can_be_root: false
                        allowed_parents: ["gts.x.core.rg.type.v1~w.core.org.department.v1~"]
                        allowed_memberships: ["gts.z.core.idp.user.v1~", "gts.z.core.lms.course.v1~"]

      responses:
        '201':
          description: Schema registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GtsSchema'
              examples:
                rg-base-contract:
                  summary: "Base contract registered"
                  value:
                    $id: "gts://gts.x.core.rg.type.v1~"
                    $schema: "http://json-schema.org/draft-07/schema#"
                    title: "Resource Group Type"
                    type: object
                    x-gts-traits-schema:
                      type: object
                      additionalProperties: false
                      properties:
                        can_be_root:
                          type: boolean
                          description: "Whether this type permits root placement."
                          default: false
                        allowed_parents:
                          type: array
                          items: { type: string, x-gts-ref: "gts.x.core.rg.type.v1~" }
                          description: "Well-known instances of allowed parent RG types."
                          default: []
                        allowed_memberships:
                          type: array
                          items: { type: string, x-gts-ref: "gts.*" }
                          description: "Resource types allowed as members."
                          default: []
                    x-gts-traits:
                      can_be_root: false
                      allowed_parents: []
                      allowed_memberships: []
                    required: [id, name]
                    properties:
                      id: { type: string, format: uuid }
                      name: { type: string, minLength: 1, maxLength: 255 }
                      parent_id: { type: [string, "null"], format: uuid }
                      tenant_id: { type: string, format: uuid, readOnly: true }
                      depth: { type: integer, readOnly: true }
                      metadata: { type: object, description: "Type-specific fields. Schema overridden by each chained RG type via allOf." }
                    x-gts-constraints:
                      placement-invariant: "can_be_root OR len(allowed_parents) >= 1"
                tenant-rg-type:
                  summary: "Chained tenant RG type registered"
                  value:
                    $id: "gts://gts.x.core.rg.type.v1~y.core.tn.tenant.v1~"
                    $schema: "http://json-schema.org/draft-07/schema#"
                    allOf:
                      - { $ref: "gts://gts.x.core.rg.type.v1~" }
                      - properties:
                          metadata:
                            type: object
                            additionalProperties: false
                            properties:
                              custom_domain: { type: string, format: hostname }
                              barrier: { type: boolean, default: false }
                        x-gts-traits:
                          can_be_root: true
                          allowed_parents: ["gts.x.core.rg.type.v1~y.core.tn.tenant.v1~"]
                          allowed_memberships: ["gts.z.core.idp.user.v1~"]
                tenant-entity:
                  summary: "Entity type registered"
                  value:
                    $id: "gts://gts.y.core.tn.tenant.v1~"
                    $schema: "http://json-schema.org/draft-07/schema#"
                    title: Tenant
                    type: object
                    required: [id, name]
                    properties:
                      id: { type: string, format: uuid }
                      name: { type: string, minLength: 1, maxLength: 255 }
                      custom_domain: { type: string, format: hostname }
                      barrier: { type: boolean, default: false }

  /api/types-registry/v1/types/{schema_id}:
    parameters:
      - $ref: '#/components/parameters/TypeSchemaId'
    get:
      operationId: getType
      tags: [types]
      summary: Get a GTS schema by schema_id
      description: Returns the raw GTS JSON Schema document.
      responses:
        '200':
          description: Schema found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GtsSchema'
              examples:
                tenant-rg-type:
                  summary: "Chained: Tenant as RG type"
                  value:
                    $id: "gts://gts.x.core.rg.type.v1~y.core.tn.tenant.v1~"
                    $schema: "http://json-schema.org/draft-07/schema#"
                    allOf:
                      - { $ref: "gts://gts.x.core.rg.type.v1~" }
                      - properties:
                          metadata:
                            type: object
                            additionalProperties: false
                            properties:
                              custom_domain: { type: string, format: hostname }
                              barrier: { type: boolean, default: false }
                        x-gts-traits:
                          can_be_root: true
                          allowed_parents: ["gts.x.core.rg.type.v1~y.core.tn.tenant.v1~"]
                          allowed_memberships: ["gts.z.core.idp.user.v1~"]
                tenant-entity:
                  summary: "Entity: Tenant"
                  value:
                    $id: "gts://gts.y.core.tn.tenant.v1~"
                    $schema: "http://json-schema.org/draft-07/schema#"
                    title: Tenant
                    type: object
                    required: [id, name]
                    properties:
                      id: { type: string, format: uuid }
                      name: { type: string, minLength: 1, maxLength: 255 }
                      custom_domain: { type: string, format: hostname }
                      barrier: { type: boolean, default: false }
                rg-base-contract:
                  summary: "Base: RG contract"
                  value:
                    $id: "gts://gts.x.core.rg.type.v1~"
                    $schema: "http://json-schema.org/draft-07/schema#"
                    title: "Resource Group Type"
                    type: object
                    x-gts-traits-schema:
                      type: object
                      additionalProperties: false
                      properties:
                        can_be_root: { type: boolean, default: false }
                        allowed_parents: { type: array, items: { type: string }, default: [] }
                        allowed_memberships: { type: array, items: { type: string }, default: [] }
                    x-gts-traits:
                      can_be_root: false
                      allowed_parents: []
                      allowed_memberships: []
                    required: [id, name]
                    properties:
                      id: { type: string, format: uuid }
                      name: { type: string, minLength: 1, maxLength: 255 }
                      parent_id: { type: [string, "null"], format: uuid }
                      tenant_id: { type: string, format: uuid, readOnly: true }
                      depth: { type: integer, readOnly: true }
                      metadata: { type: object }
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateType
      tags: [types]
      summary: Update a GTS schema
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GtsSchema'
      responses:
        '200':
          description: Schema updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GtsSchema'
    delete:
      operationId: deleteType
      tags: [types]
      summary: Delete a GTS schema
      responses:
        '204':
          description: Schema deleted

  # ── Groups ─────────────────────────────────────────────────────────

  /api/resource-group/v1/groups:
    get:
      operationId: listGroups
      tags: [groups]
      summary: List groups with filters and pagination
      description: |
        Returns paginated resource groups.

        For hierarchy traversal (ancestors, descendants, depth),
        use the dedicated `/{group_id}/hierarchy` endpoint.

        - `$filter`: `type` (eq, ne, in), `parent_id` (eq, ne, in), `id` (eq, ne, in), `name` (eq, ne, in)
        - `limit`: page size (1..200), default 25
        - `cursor`: opaque token for pagination
      x-odata-filter:
        supported_fields:
          type: [eq, ne, in]
          parent_id: [eq, ne, in]
          id: [eq, ne, in]
          name: [eq, ne, in]
      parameters:
        - $ref: '#/components/parameters/ODataFilter'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Paginated list of groups
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupPage'
              examples:
                all-groups:
                  summary: "GET ...groups — all groups"
                  value:
                    items:
                      - id: 11111111-1111-1111-1111-111111111111
                        type: "gts.x.core.rg.type.v1~y.core.tn.tenant.v1~"
                        name: T1
                        parent_id: null
                        tenant_id: 11111111-1111-1111-1111-111111111111
                      - id: 22222222-2222-2222-2222-222222222222
                        type: "gts.x.core.rg.type.v1~w.core.org.department.v1~"
                        name: D2
                        parent_id: 11111111-1111-1111-1111-111111111111
                        tenant_id: 11111111-1111-1111-1111-111111111111
                        metadata:
                          category: "finance"
                          short_description: "Mega Department"
                      - id: 33333333-3333-3333-3333-333333333333
                        type: "gts.x.core.rg.type.v1~x.core.rg.branch.v1~"
                        name: B3
                        parent_id: 22222222-2222-2222-2222-222222222222
                        tenant_id: 11111111-1111-1111-1111-111111111111
                        metadata:
                          location: "Building A, Floor 3"
                      - id: 77777777-7777-7777-7777-777777777777
                        type: "gts.x.core.rg.type.v1~y.core.tn.tenant.v1~"
                        name: T7
                        parent_id: 11111111-1111-1111-1111-111111111111
                        tenant_id: 77777777-7777-7777-7777-777777777777
                        metadata:
                          barrier: true
                    page_info:
                      next_cursor: "eyJpZCI6Ijc3NzcuLi4ifQ"
                      limit: 25

                type-eq-tenant:
                  summary: "$filter=type eq '...tenant.v1~'"
                  value:
                    items:
                      - id: 11111111-1111-1111-1111-111111111111
                        type: "gts.x.core.rg.type.v1~y.core.tn.tenant.v1~"
                        name: T1
                        parent_id: null
                        tenant_id: 11111111-1111-1111-1111-111111111111
                      - id: 77777777-7777-7777-7777-777777777777
                        type: "gts.x.core.rg.type.v1~y.core.tn.tenant.v1~"
                        name: T7
                        parent_id: 11111111-1111-1111-1111-111111111111
                        tenant_id: 77777777-7777-7777-7777-777777777777
                        metadata:
                          barrier: true
                    page_info:
                      next_cursor: "eyJpZCI6Ijc3NzcuLi4ifQ"
                      limit: 25

                parent-id-eq:
                  summary: "$filter=parent_id eq '11111111-...'"
                  description: Direct children of T1.
                  value:
                    items:
                      - id: 22222222-2222-2222-2222-222222222222
                        type: "gts.x.core.rg.type.v1~w.core.org.department.v1~"
                        name: D2
                        parent_id: 11111111-1111-1111-1111-111111111111
                        tenant_id: 11111111-1111-1111-1111-111111111111
                        metadata:
                          category: "finance"
                          short_description: "Mega Department"
                      - id: 77777777-7777-7777-7777-777777777777
                        type: "gts.x.core.rg.type.v1~y.core.tn.tenant.v1~"
                        name: T7
                        parent_id: 11111111-1111-1111-1111-111111111111
                        tenant_id: 77777777-7777-7777-7777-777777777777
                        metadata:
                          barrier: true
                    page_info:
                      next_cursor: "eyJpZCI6Ijc3NzcuLi4ifQ"
                      limit: 25

    post:
      operationId: createGroup
      tags: [groups]
      summary: Create a group
      description: |
        `type` must be a chained GTS type with `gts.x.core.rg.type.v1~` prefix.
        Derived type fields (e.g. `category`) are sent inside `metadata` object.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGroupRequest'
            examples:
              create-tenant:
                summary: Create root tenant T1
                value:
                  id: 11111111-1111-1111-1111-111111111111
                  type: "gts.x.core.rg.type.v1~y.core.tn.tenant.v1~"
                  name: T1
              create-department:
                summary: Create department D2 under T1
                value:
                  type: "gts.x.core.rg.type.v1~w.core.org.department.v1~"
                  name: D2
                  parent_id: 11111111-1111-1111-1111-111111111111
                  metadata:
                    category: "finance"
                    short_description: "Mega Department"
              create-branch:
                summary: Create branch B3 under D2
                value:
                  type: "gts.x.core.rg.type.v1~x.core.rg.branch.v1~"
                  name: B3
                  parent_id: 22222222-2222-2222-2222-222222222222
                  metadata:
                    location: "Building A, Floor 3"
              create-barrier-tenant:
                summary: Create nested tenant T7 (barrier) under T1
                value:
                  id: 77777777-7777-7777-7777-777777777777
